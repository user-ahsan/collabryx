services:
  # ─────────────────────────────────────────────
  # 1. Notification Service (lightweight)
  # ─────────────────────────────────────────────
  - type: web
    name: collabryx-notification-service
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./python-worker/notification-service/Dockerfile
    rootDir: .
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://collabryx.vercel.app

  # ─────────────────────────────────────────────
  # 2. Feed Scoring Service (Thompson Sampling)
  # ─────────────────────────────────────────────
  - type: web
    name: collabryx-feed-service
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./python-worker/feed-service/Dockerfile
    rootDir: .
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://collabryx.vercel.app

  # ─────────────────────────────────────────────
  # 3. Match Generation Service
  # ─────────────────────────────────────────────
  - type: web
    name: collabryx-match-service
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./python-worker/match-service/Dockerfile
    rootDir: .
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://collabryx.vercel.app
