# Collabryx Python Worker - Prometheus Configuration
# 
# This configuration file sets up Prometheus to scrape metrics from the
# embedding service and apply alerting rules defined in alerts.yml
#
# Documentation: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  # How frequently to scrape targets
  scrape_interval: 30s
  
  # How frequently to evaluate rules
  evaluation_interval: 30s
  
  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager)
  external_labels:
    monitor: 'collabryx-embedding-service'
    environment: 'production'
    team: 'platform'

# Alertmanager configuration (optional - for future implementation)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # =====================================================
  # Embedding Service Metrics
  # =====================================================
  - job_name: 'embedding-service'
    
    # Static configuration for single instance
    static_configs:
      - targets: ['collabryx-worker:8000']
        labels:
          service: 'embedding-service'
          environment: 'production'
    
    # Metrics endpoint path
    metrics_path: '/metrics'
    
    # Scheme (http or https)
    scheme: 'http'
    
    # Scrape timeout
    scrape_timeout: 10s
    
    # Honor labels from the scraped metrics
    honor_labels: true
    
    # Relabel configurations (optional)
    relabel_configs:
      # Add instance label from __address__
      - source_labels: [__address__]
        target_label: instance
        replacement: '${1}'
      
      # Add service name label
      - source_labels: []
        target_label: service
        replacement: 'embedding-service'
    
    # Metric relabel configurations (optional - for filtering)
    # metric_relabel_configs:
    #   - source_labels: [__name__]
    #     regex: 'go_.*'
    #     action: drop

  # =====================================================
  # Prometheus Self-Monitoring
  # =====================================================
  - job_name: 'prometheus'
    
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          environment: 'production'
    
    metrics_path: '/metrics'
    scheme: 'http'

  # =====================================================
  # Node Exporter (Optional - for host metrics)
  # =====================================================
  # Uncomment if node exporter is added to docker-compose.yml
  # - job_name: 'node-exporter'
  #   
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         service: 'node-exporter'
  #         environment: 'production'
  #   
  #   metrics_path: '/metrics'
  #   scheme: 'http'
