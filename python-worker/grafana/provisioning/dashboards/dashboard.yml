# Collabryx Grafana Dashboard Provisioning Configuration
#
# This file configures how Grafana provisions dashboards from the filesystem.
# Dashboards will be automatically loaded from the dashboards folder.
#
# Documentation: https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards

apiVersion: 1

# List of dashboard providers
providers:
  - name: 'Collabryx Embedding Service'
    type: file
    folder: 'Embedding Service'
    folderUid: 'embedding-service'
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
      
      # Watch for changes and reload dashboards automatically
      watch: true
      
      # Dashboard matching rules
      # Only load .json files
      match:
        - '*.json'
      
      # Disable dashboard deletion from UI (provisioned dashboards are read-only)
      disableDeletion: true
      
      # Allow editing provisioned dashboards (changes will be overwritten on restart)
      editable: true
      
      # Update existing dashboards
      updateIntervalSeconds: 30
