# Collabryx Alertmanager Configuration
#
# Routes alerts by severity with inhibition rules to prevent alert storms.
# Documentation: https://prometheus.io/docs/alerting/latest/configuration/

global:
  # Resolve timeout for resolved alerts
  resolve_timeout: 5m

  # SMTP configuration (placeholder - configure for production)
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@collabryx.com'
  # smtp_auth_username: 'alertmanager@collabryx.com'
  # smtp_auth_password: '${SMTP_PASSWORD}'

# Inhibition rules prevent alert storms by silencing related alerts
# when a higher-severity alert is already firing
inhibit_rules:
  # Suppress warning alerts when a critical alert is firing for the same service
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'service']

  # Suppress info alerts when a warning or critical alert is firing
  - source_matchers:
      - severity=~"critical|warning"
    target_matchers:
      - severity="info"
    equal: ['service']

# Route tree for alert delivery
route:
  # Default receiver for unmatched alerts
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'service', 'environment']

  # Wait before sending first notification for a group
  group_wait: 30s

  # Wait before sending notification for new alerts in existing group
  group_interval: 5m

  # Wait before resending a notification
  repeat_interval: 4h

  # Child routes for severity-based routing
  routes:
    # Critical alerts → PagerDuty / immediate notification
    - matchers:
        - severity="critical"
      receiver: 'pagerduty-critical'
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: false

    # Warning alerts → Slack / team channel
    - matchers:
        - severity="warning"
      receiver: 'slack-warnings'
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 4h
      continue: false

    # Info alerts → Email / low-priority channel
    - matchers:
        - severity="info"
      receiver: 'email-info'
      group_wait: 5m
      group_interval: 30m
      repeat_interval: 12h
      continue: false

# Receivers define where alerts are sent
receivers:
  # Default receiver (fallback)
  - name: 'default-receiver'
    # webhook_configs:
    #   - url: 'http://localhost:5001/webhook'
    #     send_resolved: true

  # Critical alerts → PagerDuty
  - name: 'pagerduty-critical'
    # pagerduty_configs:
    #   - service_key: '${PAGERDUTY_SERVICE_KEY}'
    #     send_resolved: true
    # Fallback: log to console if PagerDuty not configured
    webhook_configs:
      - url: 'http://localhost:5001/critical-webhook'
        send_resolved: true

  # Warning alerts → Slack
  - name: 'slack-warnings'
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#collabryx-alerts'
    #     send_resolved: true
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    #     color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    webhook_configs:
      - url: 'http://localhost:5001/slack-webhook'
        send_resolved: true

  # Info alerts → Email
  - name: 'email-info'
    # email_configs:
    #   - to: 'team@collabryx.com'
    #     send_resolved: true
    webhook_configs:
      - url: 'http://localhost:5001/email-webhook'
        send_resolved: true
