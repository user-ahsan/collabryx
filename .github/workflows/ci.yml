name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: '1'
  NODE_OPTIONS: --max-old-space-size=8192
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Supabase env vars for build-time static generation (placeholder values)
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder-for-build.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build-only
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key-for-build-only

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Clean Next.js cache
        run: rm -rf .next

      - name: Type check
        run: bun run typecheck

  build:
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Clean Next.js cache
        run: rm -rf .next

      - name: Build
        run: bun run build